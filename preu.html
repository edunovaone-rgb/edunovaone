<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(location.pathname.endsWith(".html")){history.replaceState(null,"",location.pathname.slice(0,-5)+location.search+location.hash)}</script>
  <meta name="description" content="Pre-universitaria EduNovaOne: repaso intensivo, simulacros y rutas de estudio para postular a la universidad." />
  <title>EduNovaOne | Pre-universitaria</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* PAYWALL */
    #paywallOverlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,10,35,0.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:1.5rem}
    #paywallOverlay.show{display:flex}
    .paywall-card{background:#fff;border-radius:2.5rem;padding:2.5rem 2rem;max-width:460px;width:100%;box-shadow:0 32px 80px rgba(99,102,241,0.22);display:flex;flex-direction:column;align-items:center;gap:1.25rem;text-align:center;animation:paywall-pop .35s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes paywall-pop{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .paywall-lock{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#7c3aed22,#2563eb22);border:2px solid rgba(99,102,241,0.25);display:flex;align-items:center;justify-content:center;font-size:2rem}
    .paywall-badge{display:inline-flex;align-items:center;gap:.4rem;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;padding:.35rem 1rem;border-radius:999px}
    .paywall-card h2{margin:0;font-size:1.65rem;color:#1e1b4b;font-weight:900;line-height:1.25}
    .paywall-card p{margin:0;color:#64748b;font-size:.92rem;line-height:1.65}
    .paywall-features{list-style:none;padding:0;margin:0;display:grid;gap:.55rem;width:100%;text-align:left}
    .paywall-features li{display:flex;align-items:center;gap:.6rem;font-size:.9rem;color:#334155}
    .paywall-features li .feat-icon{width:1.6rem;height:1.6rem;border-radius:50%;background:rgba(99,102,241,0.1);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
    .paywall-cta{width:100%;padding:1rem;border:none;border-radius:1rem;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,0.32);transition:transform .2s,box-shadow .2s;text-decoration:none;display:block}
    .paywall-cta:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(99,102,241,0.42)}
    .paywall-back{font-size:.85rem;color:#94a3b8;cursor:pointer;text-decoration:underline;background:none;border:none}
    .paywall-back:hover{color:#7c3aed}
    @keyframes spin{to{transform:rotate(360deg)}}
    #paywallOverlay.loading{background:rgba(245,243,255,0.92);backdrop-filter:blur(4px)}
    #paywallOverlay.loading .paywall-card{box-shadow:0 16px 40px rgba(99,102,241,0.1);padding:2.5rem}
    /* LAYOUT */
    .preu-layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 60px)}
    .preu-sidebar{background:#fff;border-right:1px solid rgba(99,102,241,0.1);padding:1.75rem 1.25rem;display:flex;flex-direction:column;gap:1.25rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
    .preu-sidebar-brand{display:flex;align-items:center;gap:.7rem}
    .preu-sidebar-brand img{width:36px;height:36px}
    .preu-sidebar-brand strong{font-size:.95rem;color:var(--accent-strong);font-weight:800}
    .preu-sidebar-brand span{font-size:.72rem;color:#c026d3;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .preu-sidebar nav{display:grid;gap:.25rem}
    .preu-sidebar nav a{display:flex;align-items:center;gap:.7rem;padding:.7rem .9rem;border-radius:1rem;color:var(--text-muted);text-decoration:none;font-size:.88rem;transition:background .2s,color .2s}
    .preu-sidebar nav a:hover{background:rgba(99,102,241,0.08);color:var(--accent-strong)}
    .preu-sidebar nav a.active{background:rgba(99,102,241,0.12);color:var(--accent-strong);font-weight:700}
    .preu-sidebar nav a .nav-icon{width:1.9rem;height:1.9rem;border-radius:.6rem;display:flex;align-items:center;justify-content:center;background:rgba(99,102,241,0.1);font-size:.88rem;flex-shrink:0}
    .preu-sidebar nav a.active .nav-icon{background:var(--accent)}
    .sidebar-plan-card{background:linear-gradient(135deg,#7c3aed,#2563eb);border-radius:1.5rem;padding:1.15rem;color:#fff;display:flex;flex-direction:column;gap:.55rem;margin-top:auto}
    .sidebar-plan-card strong{font-size:.9rem;font-weight:800;line-height:1.35}
    .sidebar-plan-card p{font-size:.78rem;opacity:.85;margin:0;line-height:1.5}
    .sidebar-plan-card a{display:block;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.35);color:#fff;text-align:center;padding:.5rem;border-radius:.85rem;font-size:.82rem;font-weight:700;text-decoration:none;transition:background .2s}
    .sidebar-plan-card a:hover{background:rgba(255,255,255,0.3)}
    /* MAIN & PANELS */
    .preu-main{padding:2rem 2.25rem;display:flex;flex-direction:column;gap:2rem;max-width:1100px;width:100%}
    .preu-panel{display:none;flex-direction:column;gap:1.75rem}
    .preu-panel.active{display:flex}
    /* HERO */
    .preu-hero{background:linear-gradient(135deg,#7c3aed 0%,#2563eb 60%,#0ea5e9 100%);border-radius:2rem;padding:2.5rem 2.75rem;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;position:relative;overflow:hidden}
    .preu-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(255,255,255,0.12) 0%,transparent 60%)}
    .preu-hero-text{position:relative;z-index:1}
    .preu-hero-text .eyebrow{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;opacity:.8;margin:0 0 .5rem}
    .preu-hero-text h1{margin:0 0 .65rem;font-size:2rem;font-weight:900;line-height:1.2}
    .preu-hero-text p{margin:0;opacity:.85;font-size:.95rem;max-width:520px;line-height:1.6}
    .preu-hero-emoji{font-size:5rem;position:relative;z-index:1;user-select:none}
    /* STATS ROW */
    .preu-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
    .preu-stat-card{background:#fff;border:1.5px solid rgba(99,102,241,0.1);border-radius:1.5rem;padding:1.25rem 1.1rem;display:flex;flex-direction:column;gap:.4rem;box-shadow:0 6px 20px rgba(15,23,42,0.05)}
    .preu-stat-card .stat-icon{font-size:1.4rem}
    .preu-stat-card .stat-val{font-size:1.65rem;font-weight:900;color:var(--accent-strong);line-height:1}
    .preu-stat-card .stat-lbl{font-size:.76rem;color:var(--text-muted);font-weight:600}
    /* SECTION CARD */
    .preu-section{background:#fff;border:1px solid rgba(99,102,241,0.08);border-radius:2rem;padding:1.75rem;box-shadow:0 8px 28px rgba(15,23,42,0.05);display:flex;flex-direction:column;gap:1.25rem}
    .preu-section-title{margin:0;font-size:1.1rem;font-weight:800;color:var(--accent-strong);display:flex;align-items:center;gap:.5rem}
    .preu-section-subtitle{margin:0;color:var(--text-muted);font-size:.88rem}
    /* MATERIAS GRID */
    .preu-materias-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1rem}
    .preu-materia-card{border:1.5px solid rgba(99,102,241,0.12);border-radius:1.5rem;padding:1.3rem 1rem;display:flex;flex-direction:column;align-items:center;gap:.6rem;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;text-align:center;background:#fafbff;text-decoration:none;color:inherit}
    .preu-materia-card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(99,102,241,0.14);border-color:var(--accent)}
    .materia-icon-wrap{width:3rem;height:3rem;border-radius:1rem;display:flex;align-items:center;justify-content:center;font-size:1.35rem}
    .preu-materia-card strong{font-size:.9rem;color:var(--accent-strong);font-weight:700}
    .preu-materia-card .sub{font-size:.75rem;color:var(--text-muted)}
    .preu-progress-bar-wrap{height:5px;background:rgba(99,102,241,0.1);border-radius:999px;overflow:hidden;width:100%}
    .preu-progress-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#7c3aed,#2563eb);transition:width .6s ease}
    .preu-materia-card .prog-row{width:100%;display:flex;flex-direction:column;gap:.25rem}
    .preu-materia-card .prog-row span{font-size:.7rem;color:var(--text-muted);text-align:left}
    /* MATERIA DETALLE */
    .materia-detail{display:none;flex-direction:column;gap:1.5rem}
    .materia-detail.active{display:flex}
    .materia-back-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:700;color:var(--accent-strong);cursor:pointer;background:none;border:none;padding:.5rem 0}
    .materia-back-btn:hover{text-decoration:underline}
    .temas-list{display:grid;gap:.7rem}
    .tema-item{display:flex;align-items:center;gap:1rem;background:#fafbff;border:1.5px solid rgba(99,102,241,0.1);border-radius:1.25rem;padding:1rem 1.25rem;transition:border-color .2s,box-shadow .2s}
    .tema-item:hover{border-color:var(--accent);box-shadow:0 6px 18px rgba(99,102,241,0.1)}
    .tema-num{width:2.4rem;height:2.4rem;border-radius:.75rem;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:.82rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .tema-info{flex:1}
    .tema-info strong{display:block;font-size:.9rem;font-weight:700;color:var(--text)}
    .tema-info span{font-size:.75rem;color:var(--text-muted)}
    .tema-badge{font-size:.68rem;font-weight:700;padding:.25rem .7rem;border-radius:999px}
    .badge-basico{background:rgba(16,185,129,0.12);color:#059669}
    .badge-medio{background:rgba(245,158,11,0.12);color:#d97706}
    .badge-avanzado{background:rgba(239,68,68,0.1);color:#dc2626}
    .tema-btn{padding:.45rem .9rem;border:none;border-radius:.75rem;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;transition:transform .15s;text-decoration:none;white-space:nowrap}
    .tema-btn:hover{transform:translateY(-1px)}
    /* SIMULACROS */
    .simulacros-list{display:grid;gap:.85rem}
    .simulacro-item{display:flex;align-items:center;gap:1rem;background:#fafbff;border:1.5px solid rgba(99,102,241,0.1);border-radius:1.25rem;padding:1rem 1.25rem;transition:border-color .2s,box-shadow .2s}
    .simulacro-item:hover{border-color:var(--accent);box-shadow:0 6px 20px rgba(99,102,241,0.1)}
    .simulacro-num{width:2.8rem;height:2.8rem;border-radius:.85rem;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:.88rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .simulacro-info{flex:1}
    .simulacro-info strong{display:block;font-size:.9rem;color:var(--text);font-weight:700}
    .simulacro-info span{font-size:.75rem;color:var(--text-muted)}
    .simulacro-badge{font-size:.68rem;font-weight:700;padding:.25rem .75rem;border-radius:999px}
    .badge-nuevo{background:rgba(16,185,129,0.12);color:#059669}
    .badge-popular{background:rgba(245,158,11,0.12);color:#d97706}
    .badge-completo{background:rgba(99,102,241,0.12);color:#4f46e5}
    .badge-dificil{background:rgba(239,68,68,0.1);color:#dc2626}
    .simulacro-btn{padding:.5rem 1rem;border:none;border-radius:.85rem;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:.8rem;font-weight:700;cursor:pointer;transition:transform .15s;text-decoration:none;white-space:nowrap}
    .simulacro-btn:hover{transform:translateY(-1px)}
    /* CONSEJOS */
    .tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .tip-card{background:#fafbff;border:1.5px solid rgba(99,102,241,0.1);border-radius:1.5rem;padding:1.2rem;display:flex;flex-direction:column;gap:.5rem}
    .tip-card .tip-icon{font-size:1.5rem}
    .tip-card strong{font-size:.9rem;color:var(--accent-strong);font-weight:700}
    .tip-card p{font-size:.82rem;color:var(--text-muted);line-height:1.6;margin:0}
    /* CRONOGRAMA */
    .crono-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem}
    .crono-day{border-radius:.85rem;padding:.65rem .35rem;text-align:center;border:1.5px solid rgba(99,102,241,0.1);background:#fafbff;cursor:pointer;transition:border-color .2s,box-shadow .2s}
    .crono-day:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(99,102,241,0.12)}
    .crono-day.activo{background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(37,99,235,0.07));border-color:var(--accent)}
    .crono-day .cd-name{font-size:.7rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;margin-bottom:.3rem}
    .crono-day .cd-emoji{font-size:1.2rem}
    .crono-day .cd-label{font-size:.65rem;color:var(--text-muted);margin-top:.25rem;line-height:1.3}
    /* RANKING */
    .ranking-list{display:grid;gap:.7rem}
    .ranking-item{display:flex;align-items:center;gap:1rem;background:#fafbff;border:1.5px solid rgba(99,102,241,0.1);border-radius:1.25rem;padding:.9rem 1.1rem}
    .ranking-pos{width:2.2rem;height:2.2rem;border-radius:.65rem;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900;flex-shrink:0}
    .pos-1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
    .pos-2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
    .pos-3{background:linear-gradient(135deg,#cd7c4f,#b45309);color:#fff}
    .pos-n{background:rgba(99,102,241,0.12);color:var(--accent-strong)}
    .ranking-info{flex:1}
    .ranking-info strong{display:block;font-size:.88rem;font-weight:700;color:var(--text)}
    .ranking-info span{font-size:.74rem;color:var(--text-muted)}
    .ranking-score{font-size:1rem;font-weight:900;color:var(--accent-strong)}
    /* RUTA */
    .ruta-steps{display:grid;gap:.7rem;position:relative}
    .ruta-step{display:flex;gap:1rem;align-items:flex-start}
    .ruta-step-dot{width:2.6rem;height:2.6rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:800;flex-shrink:0;border:2.5px solid transparent;transition:all .2s}
    .ruta-step-dot.done{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border-color:#059669}
    .ruta-step-dot.current{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border-color:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,0.18)}
    .ruta-step-dot.pending{background:#f8fafc;color:var(--text-muted);border-color:rgba(99,102,241,0.2)}
    .ruta-step-body{flex:1;padding-top:.3rem}
    .ruta-step-body strong{display:block;font-size:.9rem;font-weight:700;color:var(--text)}
    .ruta-step-body span{font-size:.78rem;color:var(--text-muted)}
    /* DIAGNOSTICO */
    .diagnostico-intro{background:linear-gradient(135deg,rgba(124,58,237,0.07),rgba(37,99,235,0.04));border:1.5px dashed rgba(99,102,241,0.25);border-radius:1.5rem;padding:1.75rem;display:flex;flex-direction:column;gap:1rem;align-items:flex-start}
    .diagnostico-intro h3{margin:0;font-size:1.1rem;color:var(--accent-strong);font-weight:800}
    .diagnostico-intro p{margin:0;font-size:.88rem;color:var(--text-muted);line-height:1.65}
    .diag-areas{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.85rem}
    .diag-area-card{background:#fff;border:1.5px solid rgba(99,102,241,0.1);border-radius:1.25rem;padding:1rem;display:flex;flex-direction:column;gap:.5rem}
    .diag-area-card .da-header{display:flex;justify-content:space-between;align-items:center}
    .diag-area-card .da-label{font-size:.83rem;font-weight:700;color:var(--text)}
    .diag-area-card .da-pct{font-size:.83rem;font-weight:700;color:var(--accent-strong)}
    .diag-bar{height:6px;border-radius:999px;background:rgba(99,102,241,0.1);overflow:hidden}
    .diag-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#7c3aed,#2563eb);transition:width .6s}
    /* MOBILE NAV */
    .preu-mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1px solid rgba(99,102,241,0.12);padding:.5rem .25rem calc(.5rem + env(safe-area-inset-bottom));gap:.1rem}
    .preu-mobile-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.35rem .2rem;border-radius:.75rem;text-decoration:none;color:var(--text-muted);font-size:.62rem;font-weight:600;transition:color .2s,background .2s}
    .preu-mobile-nav a .mn-icon{font-size:1.2rem}
    .preu-mobile-nav a.active{color:var(--accent-strong);background:rgba(99,102,241,0.08)}
    @media(max-width:900px){.preu-layout{grid-template-columns:1fr}.preu-sidebar{display:none}.preu-main{padding:1.25rem 1rem 5rem}.preu-hero{flex-direction:column;padding:1.75rem}.preu-hero-emoji{font-size:3.5rem}.preu-hero-text h1{font-size:1.5rem}.preu-mobile-nav{display:flex}}
    @media(max-width:560px){.paywall-card{padding:2rem 1.25rem;border-radius:1.75rem}.paywall-card h2{font-size:1.35rem}.crono-grid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
