<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>if(location.pathname.endsWith(".html")){history.replaceState(null,"",location.pathname.slice(0,-5)+location.search+location.hash)}</script>
  <meta name="description" content="Pre-universitaria EduNovaOne: repaso intensivo, simulacros y rutas de estudio para postular a la universidad." />
  <title>EduNovaOne | Pre-universitaria</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* PAYWALL */
    #paywallOverlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,10,35,0.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:1.5rem}
    #paywallOverlay.show{display:flex}
    .paywall-card{background:#fff;border-radius:2.5rem;padding:2.5rem 2rem;max-width:460px;width:100%;box-shadow:0 32px 80px rgba(99,102,241,0.22);display:flex;flex-direction:column;align-items:center;gap:1.25rem;text-align:center;animation:paywall-pop .35s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes paywall-pop{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .paywall-lock{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#7c3aed22,#2563eb22);border:2px solid rgba(99,102,241,0.25);display:flex;align-items:center;justify-content:center;font-size:2rem}
    .paywall-badge{display:inline-flex;align-items:center;gap:.4rem;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;padding:.35rem 1rem;border-radius:999px}
    .paywall-card h2{margin:0;font-size:1.65rem;color:#1e1b4b;font-weight:900;line-height:1.25}
    .paywall-card p{margin:0;color:#64748b;font-size:.92rem;line-height:1.65}
    .paywall-features{list-style:none;padding:0;margin:0;display:grid;gap:.55rem;width:100%;text-align:left}
    .paywall-features li{display:flex;align-items:center;gap:.6rem;font-size:.9rem;color:#334155}
    .paywall-features li .feat-icon{width:1.6rem;height:1.6rem;border-radius:50%;background:rgba(99,102,241,0.1);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
    .paywall-cta{width:100%;padding:1rem;border:none;border-radius:1rem;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,0.32);transition:transform .2s,box-shadow .2s;text-decoration:none;display:block}
    .paywall-cta:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(99,102,241,0.42)}
    .paywall-back{font-size:.85rem;color:#94a3b8;cursor:pointer;text-decoration:underline;background:none;border:none}
    .paywall-back:hover{color:#7c3aed}
    @keyframes spin{to{transform:rotate(360deg)}}
    #paywallOverlay.loading{background:rgba(245,243,255,0.92);backdrop-filter:blur(4px)}
    #paywallOverlay.loading .paywall-card{box-shadow:0 16px 40px rgba(99,102,241,0.1);padding:2.5rem}
    /* LAYOUT */
    .preu-layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 60px)}
    .preu-sidebar{background:#fff;border-right:1px solid rgba(99,102,241,0.1);padding:1.75rem 1.25rem;display:flex;flex-direction:column;gap:1.25rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
    .preu-sidebar-brand{display:flex;align-items:center;gap:.7rem}
    .preu-sidebar-brand img{width:36px;height:36px}
    .preu-sidebar-brand strong{font-size:.95rem;color:var(--accent-strong);font-weight:800}
    .preu-sidebar-brand span{font-size:.72rem;color:#c026d3;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
    .preu-sidebar nav{display:grid;gap:.25rem}
    .preu-sidebar nav a{display:flex;align-items:center;gap:.7rem;padding:.7rem .9rem;border-radius:1rem;color:var(--text-muted);text-decoration:none;font-size:.88rem;transition:background .2s,color .2s}
    .preu-sidebar nav a:hover{background:rgba(99,102,241,0.08);color:var(--accent-strong)}
    .preu-sidebar nav a.active{background:rgba(99,102,241,0.12);color:var(--accent-strong);font-weight:700}
    .preu-sidebar nav a .nav-icon{width:1.9rem;height:1.9rem;border-radius:.6rem;display:flex;align-items:center;justify-content:center;background:rgba(99,102,241,0.1);font-size:.88rem;flex-shrink:0}
    .preu-sidebar nav a.active .nav-icon{background:var(--accent)}
    .sidebar-plan-card{background:linear-gradient(135deg,#7c3aed,#2563eb);border-radius:1.5rem;padding:1.15rem;color:#fff;display:flex;flex-direction:column;gap:.55rem;margin-top:auto}
    .sidebar-plan-card strong{font-size:.9rem;font-weight:800;line-height:1.35}
    .sidebar-plan-card p{font-size:.78rem;opacity:.85;margin:0;line-height:1.5}
    .sidebar-plan-card a{display:block;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.35);color:#fff;text-align:center;padding:.5rem;border-radius:.85rem;font-size:.82rem;font-weight:700;text-decoration:none;transition:background .2s}
    .sidebar-plan-card a:hover{background:rgba(255,255,255,0.3)}
    /* MAIN & PANELS */
    .preu-main{padding:2rem 2.25rem;display:flex;flex-direction:column;gap:2rem;max-width:1100px;width:100%}
    .preu-panel{display:none;flex-direction:column;gap:1.75rem}
    .preu-panel.active{display:flex}
    /* HERO */
    .preu-hero{background:linear-gradient(135deg,#7c3aed 0%,#2563eb 60%,#0ea5e9 100%);border-radius:2rem;padding:2.5rem 2.75rem;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;position:relative;overflow:hidden}
    .preu-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(255,255,255,0.12) 0%,transparent 60%)}
    .preu-hero-text{position:relative;z-index:1}
    .preu-hero-text .eyebrow{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;opacity:.8;margin:0 0 .5rem}
    .preu-hero-text h1{margin:0 0 .65rem;font-size:2rem;font-weight:900;line-height:1.2}
    .preu-hero-text p{margin:0;opacity:.85;font-size:.95rem;max-width:520px;line-height:1.6}
    .preu-hero-emoji{font-size:5rem;position:relative;z-index:1;user-select:none}
    /* STATS ROW */
    .preu-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
    .preu-stat-card{background:#fff;border:1.5px solid rgba(99,102,241,0.1);border-radius:1.5rem;padding:1.25rem 1.1rem;display:flex;flex-direction:column;gap:.4rem;box-shadow:0 6px 20px rgba(15,23,42,0.05)}
    .preu-stat-card .stat-icon{font-size:1.4rem}
    .preu-stat-card .stat-val{font-size:1.65rem;font-weight:900;color:var(--accent-strong);line-height:1}
    .preu-stat-card .stat-lbl{font-size:.76rem;color:var(--text-muted);font-weight:600}
    /* SECTION CARD */
    .preu-section{background:#fff;border:1px solid rgba(99,102,241,0.08);border-radius:2rem;padding:1.75rem;box-shadow:0 8px 28px rgba(15,23,42,0.05);display:flex;flex-direction:column;gap:1.25rem}
    .preu-section-title{margin:0;font-size:1.1rem;font-weight:800;color:var(--accent-strong);display:flex;align-items:center;gap:.5rem}
    .preu-section-subtitle{margin:0;color:var(--text-muted);font-size:.88rem}
