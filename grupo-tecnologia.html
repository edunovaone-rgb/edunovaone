<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tecnología y Programación | EduNova</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body{margin:0}
    .grupo-hero{background:linear-gradient(135deg,rgba(2,132,199,0.12),rgba(3,105,161,0.06));border-radius:2rem;padding:2rem;display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem}
    .grupo-hero-icon{font-size:3rem;width:5rem;height:5rem;background:rgba(2,132,199,0.15);border-radius:1.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .grupo-hero-info h2{margin:0 0 .4rem;color:var(--accent-strong);font-size:1.8rem}
    .grupo-hero-info p{margin:0 0 .75rem;color:var(--text-muted)}
    .grupo-hero-meta{display:flex;gap:1rem;flex-wrap:wrap}
    .grupo-meta-badge{padding:.3rem .85rem;border-radius:999px;background:rgba(2,132,199,0.1);color:#0284c7;font-size:.82rem;font-weight:700}
    .grupo-layout{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:1.5rem;align-items:start}
    .grupo-main{display:grid;gap:1.25rem}
    .grupo-sidebar{display:grid;gap:1.25rem}
    .grupo-card{background:#fff;border:1px solid rgba(59,130,246,0.1);border-radius:1.5rem;padding:1.4rem;box-shadow:0 12px 28px rgba(15,23,42,0.05)}
    .grupo-card h3{margin:0 0 1rem;color:var(--accent-strong);font-size:1rem;font-weight:700}
    .grupo-tabs{display:flex;gap:0;border-bottom:2px solid rgba(148,163,184,0.15);margin-bottom:1.25rem}
    .grupo-tab-btn{padding:.75rem 1.2rem;border:none;background:transparent;color:var(--text-muted);font-size:.92rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s}
    .grupo-tab-btn:hover{color:var(--accent-strong)}
    .grupo-tab-btn.active{color:var(--accent-strong);border-bottom-color:#0284c7;font-weight:700}
    .grupo-tab-panel{display:none}.grupo-tab-panel.active{display:block}
    .recursos-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
    .recurso-card{display:flex;align-items:center;gap:.85rem;padding:.9rem 1rem;background:#f8fbff;border:1px solid rgba(59,130,246,0.1);border-radius:1.1rem;cursor:pointer;transition:transform .2s,box-shadow .2s}
    .recurso-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(2,132,199,0.12)}
    .recurso-type-icon{width:2.6rem;height:2.6rem;border-radius:.75rem;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
    .rtype-pdf{background:rgba(239,68,68,0.12);color:#dc2626}
    .rtype-video{background:rgba(16,185,129,0.12);color:#059669}
    .rtype-doc{background:rgba(37,99,235,0.12);color:#2563eb}
    .recurso-card-info strong{font-size:.88rem;color:var(--text);display:block;font-weight:700}
    .recurso-card-info span{font-size:.78rem;color:var(--text-muted)}
    .foro-list{display:grid;gap:.85rem}
    .foro-item{padding:1rem;background:#f8fbff;border:1px solid rgba(59,130,246,0.08);border-radius:1.1rem;cursor:pointer;transition:border-color .2s}
    .foro-item:hover{border-color:rgba(2,132,199,0.3)}
    .foro-item-title{font-size:.92rem;font-weight:700;color:var(--text)}
    .foro-item-desc{font-size:.83rem;color:var(--text-muted);margin:.3rem 0 .6rem}
    .foro-item-meta{display:flex;align-items:center;gap:1rem}
    .foro-avatars{display:flex}
    .foro-avatars span{width:1.6rem;height:1.6rem;border-radius:50%;background:#0284c7;color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;margin-left:-.4rem}
    .foro-avatars span:first-child{margin-left:0}
    .foro-members,.foro-comments{font-size:.78rem;color:var(--text-muted)}
    .foro-new-input{display:flex;align-items:center;gap:.75rem;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(148,163,184,0.12)}
    .foro-new-input input{flex:1;padding:.65rem 1rem;border:1.5px solid rgba(148,163,184,0.2);border-radius:999px;font-size:.88rem;outline:none;font-family:inherit;background:#fafbff}
    .tarea-list{display:grid;gap:.75rem;list-style:none;padding:0;margin:0}
    .tarea-item{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;background:#f8fbff;border-radius:1rem;font-size:.9rem;color:var(--text-muted)}
    .tarea-badge{padding:.25rem .7rem;border-radius:999px;font-size:.75rem;font-weight:700;white-space:nowrap}
    .tarea-pending{background:rgba(245,158,11,0.12);color:#d97706}
    .tarea-done{background:rgba(16,185,129,0.12);color:#059669}
    .tarea-icon{width:2rem;height:2rem;border-radius:.6rem;background:rgba(2,132,199,0.1);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
    .miembro-search{display:flex;align-items:center;gap:.5rem;padding:.55rem .85rem;border:1.5px solid rgba(148,163,184,0.2);border-radius:.9rem;margin-bottom:.85rem;background:#fafbff}
    .miembro-search input{border:none;outline:none;font-size:.85rem;background:transparent;flex:1;font-family:inherit}
    .miembros-list{display:grid;gap:.55rem;list-style:none;padding:0;margin:0}
    .miembro-item{display:flex;align-items:center;gap:.75rem}
    .miembro-avatar{width:2.2rem;height:2.2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;flex-shrink:0}
    .miembro-info strong{font-size:.85rem;color:var(--text);display:block}
    .miembro-info span{font-size:.75rem;color:var(--text-muted)}
    .evento-item{padding:.75rem 1rem;background:#f8fbff;border-radius:1rem;font-size:.88rem;color:var(--text-muted);border-left:3px solid #0284c7}
    .evento-item strong{display:block;color:var(--text);font-size:.9rem;margin-bottom:.2rem}
    .grupos-mini-list{display:grid;gap:.75rem}
    .grupo-mini-card{display:flex;gap:.75rem;align-items:flex-start;padding:.75rem;background:#f8fbff;border-radius:1rem;cursor:pointer;transition:background .2s;text-decoration:none}
    .grupo-mini-card:hover{background:rgba(2,132,199,0.06)}
    .grupo-mini-icon{width:2.4rem;height:2.4rem;border-radius:.75rem;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .grupo-mini-info strong{font-size:.85rem;color:var(--accent-strong);display:block}
    .grupo-mini-info p{margin:0;font-size:.75rem;color:var(--text-muted);line-height:1.4}
    .grupo-mini-info small{font-size:.75rem;color:var(--text-muted)}
    .ver-todos-btn{width:100%;margin-top:.75rem;padding:.65rem;border:1.5px solid rgba(99,102,241,0.2);border-radius:999px;background:#fff;color:var(--accent-strong);font-weight:700;font-size:.85rem;cursor:pointer;transition:background .2s}
    .ver-todos-btn:hover{background:rgba(99,102,241,0.06)}
    .posts-feed{display:grid;gap:.75rem}
    .grupo-post{padding:.9rem 1rem;background:#f8fbff;border-radius:1rem;display:flex;gap:.75rem}
    .grupo-post-avatar{width:2rem;height:2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0}
    .grupo-post-body strong{font-size:.85rem;color:var(--text);display:block;margin-bottom:.2rem}
    .grupo-post-body p{margin:0;font-size:.85rem;color:var(--text-muted);line-height:1.5}
    .grupo-post-body small{font-size:.72rem;color:var(--text-muted)}
    .post-form{display:grid;gap:.75rem}
    .post-form textarea{padding:.85rem 1rem;border:1.5px solid rgba(148,163,184,0.25);border-radius:1rem;font-size:.92rem;font-family:inherit;resize:vertical;min-height:80px;outline:none}
    .post-form textarea:focus{border-color:var(--accent)}
    .post-form button{padding:.7rem 1.4rem;border:none;border-radius:999px;background:linear-gradient(135deg,#0284c7,#0369a1);color:#fff;font-weight:700;cursor:pointer;justify-self:end}
    .leave-btn{width:100%;padding:.85rem;border:1.5px solid rgba(239,68,68,0.3);border-radius:1rem;background:transparent;color:#ef4444;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .2s}
    .leave-btn:hover{background:rgba(239,68,68,0.06)}
    @media(max-width:900px){.grupo-layout{grid-template-columns:1fr}.recursos-grid{grid-template-columns:1fr}}
  </style>
</head>
