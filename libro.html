<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recurso no disponible | EduNova Library</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f5f7ff; }
    .msg-card {
      text-align: center;
      background: #fff;
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(15,23,42,0.07);
    }
    .msg-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .msg-card h2 { margin: 0 0 .75rem; color: var(--accent-strong); font-size: 1.5rem; }
    .msg-card p  { margin: 0 0 1.5rem; color: var(--text-muted); line-height: 1.7; font-size: .95rem; }
  </style>
</head>
<body>
  <div class="msg-card">
    <div class="msg-icon">📖</div>
    <h2>Contenido no disponible aún</h2>
    <p>Este recurso está en preparación y estará disponible próximamente. ¡Vuelve pronto!</p>
    <a href="biblioteca.html" class="button button-primary">← Volver a la Biblioteca</a>
  </div>
</body>
</html>
